id: install_cowsay
description: |
  /workspace/app.py imports the third-party `cowsay` package and prints
  a cow saying "hello prehnite". A virtualenv has already been created at
  /workspace/venv during setup, but `cowsay` is not installed in it.

  Install cowsay into the venv (use `/workspace/venv/bin/pip install cowsay`)
  so that running `/workspace/venv/bin/python /workspace/app.py` succeeds
  and the output contains the message.

  This task uses `network.mode: restricted` — the sandbox routes egress
  through an allowlisting proxy. PyPI hosts are in the default allowlist,
  so `pip install cowsay` works; any other outbound connection would be
  denied and logged as an `egress_attempt` event in the trajectory.
image: prehnite-base:latest
network:
  mode: restricted
timeout_seconds: 180
workdir: /workspace
tags: [network, package-management]
difficulty: easy
setup:
  - rm -rf /workspace/*
  - python3 -m venv /workspace/venv
  - |
    cat > /workspace/app.py <<'PY'
    import cowsay
    cowsay.cow("hello prehnite")
    PY
verify:
  # If cowsay isn't installed, app.py raises ImportError and prints nothing
  # to stdout, so grep -q returns 1 and the verify fails.
  - /workspace/venv/bin/python /workspace/app.py | grep -q "hello prehnite"
